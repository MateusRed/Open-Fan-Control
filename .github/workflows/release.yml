name: Release

# Push a tag like v1.0.0 to build the self-contained .exe and publish a GitHub Release.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Derive version from tag
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish self-contained single-file exe
        run: >
          dotnet publish src/OpenFanControl/OpenFanControl.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:Version=${{ steps.ver.outputs.version }}
          -o publish

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: publish/OpenFanControl.exe
          generate_release_notes: true
